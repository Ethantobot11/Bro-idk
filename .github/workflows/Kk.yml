name: Build Unsigned GameMaker iOS Project

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Authenticate and Build using GameMaker CLI
      env:
        GM_USER: ${{ secrets.GM_USERNAME }}
        GM_PASS: ${{ secrets.GM_PASSWORD }}
      run: |       
        export CODE_SIGN_IDENTITY="-"
        export CODE_SIGNING_REQUIRED=NO
        export CODE_SIGNING_ALLOWED=NO
        npx @gamemaker/gm-cli@latest package \
          --target=ios \
          --output="${{ github.workspace }}/output/" \
          "${{ github.workspace }}/YourProjectName.yyp"
    - name: Upload Unsigned Output
      uses: actions/upload-artifact@v4
      with:
        name: game-unsigned-ios
        path: ${{ github.workspace }}/output/
        retention-days: 7
